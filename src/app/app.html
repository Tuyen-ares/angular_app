

<main class="main">
 <app-header-layout></app-header-layout>
 
<div class="wrapper-cart">
  <h1>shopping cart</h1>

<div class="group-cart">

  <div class="header-cart">
    <div class="col-1">image</div>
    <div class="col-2">name</div>
    <div class="col-3">price</div>
    <div class="col-4">action</div>
</div>
<div class="group-body">
  <div class="row-cart" *ngFor="let item of product">
    <div class="col-1">
      <img width="50px" src="/assets/images/samba.jpg" alt="">
    </div>
    <div class="col-2">{{ 'Sampa OG' | upperCasePipe }}</div>
    <div class="col-3">{{ 400000 | currencyPipe }}</div>
    <div class="col-4"></div>
     <img width="20px" src="/assets/images/bin.png" alt="">
  </div>
</div>
</div>
</div>
</main>
<router-outlet />
